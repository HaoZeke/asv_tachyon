name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs deps
        run: |
          python -m pip install -U pip
          pip install -e '.[docs]'
      - name: Build (RST sources if present)
        run: |
          if [ -f docs/source/index.rst ]; then
            sphinx-build -b html docs/source docs/build/html
          else
            mkdir -p docs/build/html
            cp README.md docs/build/html/index.md
            echo '<meta http-equiv="refresh" content="0; url=https://github.com/HaoZeke/asv_tachyon">' > docs/build/html/index.html
          fi
      - name: Deploy
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
