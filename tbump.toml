github_url = "https://github.com/HaoZeke/asv_tachyon/"

[version]
current = "0.1.0"
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  '''

[git]
message_template = "REL: Bump version to v{new_version}"
tag_template = "v{new_version}"

[[file]]
src = "docs/source/conf.py"

[[file]]
src = "pixi.toml"

[[before_commit]]
name = "generate-release-notes"
cmd = 'towncrier build --version {new_version} --date "$(date -u +%Y-%m-%d)"'

[[before_commit]]
name = "check-changelog"
cmd = "grep -q {new_version} CHANGELOG.md"
