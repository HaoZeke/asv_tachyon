[tool.towncrier]
package = "asv_tachyon"
package_dir = "src"
directory = "changelog.d"
filename = "CHANGELOG.md"
start_string = "<!-- towncrier release notes start -->\n"
underlines = ["", "", ""]
title_format = "## [{version}](https://github.com/HaoZeke/asv_tachyon/tree/v{version}) - {project_date}"
issue_format = "[#{issue}](https://github.com/HaoZeke/asv_tachyon/issues/{issue})"
